name: Restrict PR source branch into dev

on:
  pull_request:
    branches:
      - dev

jobs:
  restrict-source-branch:
    name: restrict-source-branch
    runs-on: ubuntu-latest

    steps:
      - name: Only allow feature/*, task/*, or bug/* into dev
        shell: bash
        run: |
          base="${{ github.base_ref }}"
          head="${{ github.head_ref }}"

          echo "Target branch: $base"
          echo "Source branch: $head"

          if [[ "$base" != "dev" ]]; then
            echo "This check only applies to PRs targeting dev."
            exit 0
          fi

          if [[ "$head" == feature/* || "$head" == task/* || "$head" == bug/* ]]; then
            echo "Allowed source branch."
            exit 0
          fi

          echo "Branch '$head' is not allowed to merge into '$base'."
          echo "Allowed source branch patterns: feature/*, task/*, bug/*"
          exit 1
